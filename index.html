<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m1u2 — сервисы</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(135deg, #eff6ff, #f5f3ff);
        color: #1f2937;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }
      h1 { margin: 0 0 12px; font-size: 2rem; }
      p { margin: 0 0 24px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 14px;
      }
      a.card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: #ffffff;
        border: 1px solid #dbeafe;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 8px 24px rgba(30, 41, 59, 0.06);
      }
      a.card:hover { border-color: #93c5fd; transform: translateY(-2px); }
      .name { font-weight: 700; margin-bottom: 6px; }
      code { font-size: 0.875rem; color: #334155; }
    </style>
  </head>
  <body>
    <main>
      <h1>Сервисы репозитория m1u2</h1>
      <p>Каждый сервис опубликован в отдельной папке и доступен по пути <code>/m1u2/&lt;folder&gt;/</code>.</p>

      <section class="grid" aria-label="Список сервисов">
        <a class="card" href="./copy/">
          <div class="name">copy</div>
          <code>/m1u2/copy/</code>
        </a>
        <a class="card" href="./wheel/">
          <div class="name">wheel</div>
          <code>/m1u2/wheel/</code>
        </a>
        <a class="card" href="./trunks/">
          <div class="name">trunks</div>
          <code>/m1u2/trunks/</code>
        </a>
        <a class="card" href="./draw/">
          <div class="name">draw</div>
          <code>/m1u2/draw/</code>
        </a>
        <a class="card" href="./find/">
          <div class="name">find</div>
          <code>/m1u2/find/</code>
        </a>
      </section>
    </main>
  </body>
</html>
