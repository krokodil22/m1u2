<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Колесо-игра</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <img class="page-logo" src="logo.webp" alt="Логотип" />

    <main class="game-layout">
      <section class="game-panel">
        <h1>Лови съедобное!</h1>
        <div id="game-area" aria-label="Игровое поле">
          <div class="hud" aria-label="Статистика игры">
            <p class="hud-row">Счёт: <span id="score">0</span></p>
            <p class="hud-row">Жизни: <span id="lives" class="lives" aria-label="Оставшиеся жизни"></span></p>
          </div>
          <div id="start-overlay" class="start-overlay">
            <button id="start-btn" type="button">Старт</button>
          </div>
          <img id="player" src="grisha.svg" alt="Персонаж" />
        </div>
      </section>

      <aside class="sidebar">
        <div class="controls-hint" aria-label="Подсказка к управлению">
          <img class="controls-hint__mouse" src="mouse.png" alt="Компьютерная мышь" />
          <ul class="controls-hint__steps">
            <li>Крути колесо мыши вверх-вниз, чтобы управлять Гришей!</li>
          </ul>
        </div>
      </aside>
    </main>

    <div id="game-over-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
      <div class="modal-content">
        <h2 id="game-over-title">Игра окончена!</h2>
        <p id="game-over-message">Твой счет: 0</p>
        <button id="restart-btn" type="button">Играть снова</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
